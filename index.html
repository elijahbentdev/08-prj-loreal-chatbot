<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>L'ORÉAL | Smart Beauty Advisor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Jost:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- HEADER -->
    <header class="site-header">
      <div class="header-inner">
        <div class="logo-area">
          <img src="assets/loreal-logo.png" alt="L'Oréal" class="logo-img" />
        </div>
        <div class="advisor-label">Smart Beauty Advisor</div>
      </div>
    </header>

    <!-- MAIN CHAT AREA -->
    <main class="chat-wrapper">
      <!-- User question display (LevelUp: Display User Question) -->
      <div
        class="user-question-display"
        id="userQuestionDisplay"
        aria-live="polite"
      >
        <!-- Populated dynamically -->
      </div>

      <!-- Chat conversation container (LevelUp: Chat Conversation UI) -->
      <div
        class="chat-container"
        id="chatContainer"
        role="log"
        aria-label="Chat conversation"
        aria-live="polite"
      >
        <!-- Welcome message injected by JS on load -->
      </div>

      <!-- Typing indicator -->
      <div class="typing-indicator" id="typingIndicator" hidden>
        <span></span><span></span><span></span>
      </div>

      <!-- Input area -->
      <div class="input-area">
        <textarea
          id="userInput"
          class="chat-input"
          placeholder="Ask me about skincare, haircare, makeup, or routines…"
          rows="1"
          aria-label="Your message"
        ></textarea>
        <button id="sendBtn" class="send-btn" aria-label="Send message">
          <svg
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
    </main>

    <!-- FOOTER -->
    <footer class="site-footer">
      <div class="footer-inner">
        <span>&copy; 2026 L'Oréal. All rights reserved.</span>
        <nav class="footer-nav">
          <a href="#">Privacy Policy</a>
          <a href="#">Terms of Use</a>
          <a href="#">Contact Us</a>
        </nav>
      </div>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
